<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="description" content="MeInspect - Professional Property Condition Reports for Landlords, Tenants & Inspectors" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MeInspect" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="msapplication-TileColor" content="#2563eb" />
    <meta name="msapplication-tap-highlight" content="no" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/meinspect-logo.png?v=2" />
    <link rel="icon" type="image/png" href="/meinspect-logo.png?v=2" />
    <title>MeInspect — Property Condition Reports</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      /* PWA install prompt styles */
      .pwa-install-banner {
        position: fixed;
        bottom: 40px;
        left: 0;
        right: 0;
        background: linear-gradient(135deg, #1e3a5f, #2563eb);
        color: white;
        padding: 16px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        z-index: 9999;
        box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
        transform: translateY(100%);
        transition: transform 0.3s ease;
      }
      .pwa-install-banner.show {
        transform: translateY(0);
      }
      .pwa-install-btn {
        background: white;
        color: #2563eb;
        border: none;
        padding: 10px 20px;
        border-radius: 8px;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
      }
      .pwa-dismiss-btn {
        background: transparent;
        color: rgba(255,255,255,0.7);
        border: none;
        padding: 10px;
        font-size: 14px;
        cursor: pointer;
      }
      /* Safe area padding for notched devices */
      .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
    <script type="module" crossorigin src="/assets/index-0fetx-Ec.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-DN2mrvJA.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Register service worker for PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registered:', reg.scope))
            .catch(err => console.log('SW registration failed:', err));
        });
      }

      // PWA install prompt
      let deferredPrompt;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        // Show install banner after 3 seconds
        setTimeout(() => {
          const banner = document.getElementById('pwa-install-banner');
          if (banner) banner.classList.add('show');
        }, 3000);
      });

      function installPWA() {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          deferredPrompt.userChoice.then((choiceResult) => {
            if (choiceResult.outcome === 'accepted') {
              document.getElementById('pwa-install-banner').classList.remove('show');
            }
            deferredPrompt = null;
          });
        }
      }

      function dismissInstall() {
        document.getElementById('pwa-install-banner').classList.remove('show');
        localStorage.setItem('pwa-install-dismissed', 'true');
      }

      // Don't show if already dismissed
      window.addEventListener('load', () => {
        if (localStorage.getItem('pwa-install-dismissed') === 'true') {
          const banner = document.getElementById('pwa-install-banner');
          if (banner) banner.style.display = 'none';
        }
      });
    </script>
    <!-- PWA Install Banner -->
    <div id="pwa-install-banner" class="pwa-install-banner safe-area-bottom">
      <div>
        <div style="font-weight: 700; font-size: 15px;">📱 Install MeInspect</div>
        <div style="font-size: 12px; opacity: 0.8; margin-top: 2px;">Add to home screen for the best experience</div>
      </div>
      <div style="display: flex; gap: 8px;">
        <button class="pwa-dismiss-btn" onclick="dismissInstall()">Later</button>
        <button class="pwa-install-btn" onclick="installPWA()">Install</button>
      </div>
    </div>
  </body>
</html>
